{% extends 'base.html' %}
{% block title %}Login – CardHub{% endblock %}

{% block content %}
<section style="min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">

  <div style="width: 100%; max-width: 420px; background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">

    <!-- Header with Logo -->
    <div style="text-align: center; margin-bottom: 30px;">
      <img src="{{ url_for('static', filename='images/logo-ch.svg') }}" alt="CardHub" style="height: 60px; width: 60px; margin-bottom: 15px;">
      <h1 style="font-size: 1.75rem; color: #667eea; margin-bottom: 8px;">Welcome back</h1>
      <p style="color: #666; font-size: 0.95rem;">Login to continue designing your invitations.</p>
    </div>

    <!-- Form -->
    <form method="post" style="margin-bottom: 24px;">

      <div style="margin-bottom: 20px;">
        <label style="display: block; font-size: 0.9rem; color: #555; margin-bottom: 8px;">
          Username or Email
        </label>
        <input type="text"
               name="username_or_email"
               required
               style="width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; background: #f8f9fa; transition: border-color 0.3s;">
      </div>

      <div style="margin-bottom: 24px;">
        <label style="display: block; font-size: 0.9rem; color: #555; margin-bottom: 8px;">
          Password
        </label>
        <input type="password"
               name="password"
               required
               style="width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; background: #f8f9fa; transition: border-color 0.3s;">
      </div>

      <button type="submit" style="width: 100%; padding: 14px; border-radius: 8px; background: #667eea; color: white; font-weight: 600; border: none; cursor: pointer; font-size: 1rem;">
        Login
      </button>

    </form>

    <!-- Footer -->
    <p style="text-align: center; color: #666; font-size: 0.95rem;">
      Don't have an account?
      <a href="{{ url_for('register') }}" style="color: #667eea; font-weight: 500;">
        Register
      </a>
    </p>

  </div>

</section>
{% endblock %}
